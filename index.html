<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>학교생활 MBTI 테스트</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#ffe6f2,#e6f7ff);display:flex;justify-content:center;padding:30px}
.card{background:#fff;border-radius:20px;max-width:700px;width:100%;padding:25px;box-shadow:0 8px 20px rgba(0,0,0,.15)}
h1{text-align:center;color:#ff6fa5}button{display:block;width:100%;margin:10px 0;padding:14px;border:none;border-radius:14px;background:#cfefff;font-size:18px;cursor:pointer}
button:hover{background:#b7e3ff}#progress{height:12px;background:#eee;border-radius:8px;overflow:hidden}#bar{height:100%;width:0;background:#ff9ac7}
</style></head><body><div class="card">
<h1>🏫🌸 학교생활 MBTI 테스트 🐰💖</h1><div id="progress"><div id="bar"></div></div>
<div id="app"></div></div>
<script>
const qs=[
["쉬는 시간!","친구들과 논다 😆","혼자 쉰다 📚","E","I"],
["조별과제","리더 맡는다 ✨","자료조사 📖","E","I"],
["발표","앞에서 신난다 🎤","긴장된다 😳","E","I"],
["시험공부","계획 세운다 📝","그때그때 😅","J","P"],
["숙제","미리 끝낸다 ✅","마감 직전 🔥","J","P"],
["급식","늘 같은 메뉴 🍛","새 메뉴 🍜","S","N"],
["수업","사실 위주 📘","상상 좋아 💡","S","N"],
["친구 고민","공감 💖","해결책 제시 🛠","F","T"]
];
let s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0},i=0;
const app=document.getElementById("app");
function draw(){
document.getElementById("bar").style.width=(i/qs.length*100)+"%";
if(i>=qs.length){
let r=(s.E>=s.I?"E":"I")+(s.S>=s.N?"S":"N")+(s.T>=s.F?"T":"F")+(s.J>=s.P?"J":"P");
app.innerHTML=`<h2>🎉 결과: ${r}</h2><p>${desc(r)}</p><button onclick="location.reload()">다시하기 🔄</button>`;return;}
let q=qs[i];
app.innerHTML=`<h2>📚 ${q[0]}</h2><button onclick="ans('${q[3]}')">${q[1]}</button><button onclick="ans('${q[4]}')">${q[2]}</button>`;
}
function ans(k){s[k]++;i++;draw();}
function desc(t){
const d={
INTJ:"🦉 전략가",INTP:"🔬 논리학자",ENTJ:"👑 지휘관",ENTP:"🚀 토론가",
INFJ:"🌙 옹호자",INFP:"🌸 중재자",ENFJ:"🌞 선도자",ENFP:"🎈 활동가",
ISTJ:"📚 현실주의자",ISFJ:"🐻 수호자",ESTJ:"📋 관리자",ESFJ:"🍰 사교가",
ISTP:"🛠 장인",ISFP:"🎨 예술가",ESTP:"⚽ 사업가",ESFP:"🎉 연예인"};
return d[t]||"✨ 너만의 매력이 가득한 유형!";
}
draw();
</script></body></html>
